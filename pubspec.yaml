name: cocoaguard
description: "CocoaGuard — offline cocoa disease detection and farming assistant powered by Gemma 4"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ML inference (TFLite)
  tflite_flutter: ^0.11.0

  # Camera + image handling
  image_picker: ^1.1.2
  camera: ^0.11.1
  image: ^4.3.0

  # State management
  provider: ^6.1.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Networking — Gemma 4 cloud API
  http: ^1.2.0
  flutter_dotenv: ^5.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/
    - assets/data/
    - assets/images/
    - cocoaguard_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "cocoaguard_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "cocoaguard_logo.png"
